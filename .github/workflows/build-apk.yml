name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm packages
        run: npm install --legacy-peer-deps

      - name: Add Android platform (Capacitor)
        run: npx cap add android

      - name: Apply native patch (MediaScanner plugin + permissions + JS bridge)
        run: bash native-patch/apply-patch.sh

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Java version mismatch in text-to-speech plugin
        run: |
          find node_modules/@capacitor-community/text-to-speech -name "build.gradle" -exec sed -i \
            -e 's/JavaVersion\.VERSION_21/JavaVersion.VERSION_17/g' \
            -e 's/sourceCompatibility[[:space:]]*=\?[[:space:]]*21/sourceCompatibility = 17/g' \
            -e 's/targetCompatibility[[:space:]]*=\?[[:space:]]*21/targetCompatibility = 17/g' {} +
          echo "Imesahihishwa (kama faili lilipatikana):"
          find node_modules/@capacitor-community/text-to-speech -name "build.gradle" -exec grep -H "Compatibility\|JavaVersion" {} \; || echo "Hakuna mistari ya Compatibility ilipatikana."

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jp-player-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
